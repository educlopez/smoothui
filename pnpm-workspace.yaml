packages:
  - "apps/*"
  - "packages/*"
  - "packages/smoothui/components/*"
  - "packages/smoothui/blocks/*/*"
  - "packages/smoothui/blocks/shared"

allowBuilds:
  esbuild: true
  msw: true
  sharp: true

overrides:
  react: "^19.2.1"
  react-dom: "^19.2.1"
  shiki: "^4.0.2"
  "@shikijs/types": "^4.0.2"
  glob: ">=10.5.0"
  "@types/react": "^19.2.7"
  "@types/react-dom": "^19.2.3"
  csstype: "^3.2.3"
  lodash: ">=4.18.0"
  qs: ">=6.15.2"
  diff: ">=8.0.3"
  "@isaacs/brace-expansion": ">=5.0.1"
  "@modelcontextprotocol/sdk": ">=1.26.0"
  mdast-util-to-hast: ">=13.2.1"
  rollup: ">=4.59.0"
  minimatch: ">=10.2.3"
  ajv: ">=8.18.0"
  hono: ">=4.12.18"
  "@hono/node-server": ">=1.19.13"
  fast-uri: ">=3.1.2"
  ip-address: ">=10.1.1"
  "postcss@<8.5.10": ">=8.5.10"
  body-parser: ">=2.2.1"
  js-yaml: ">=4.1.1"
  "@octokit/request": ">=8.4.1"
  "@octokit/plugin-paginate-rest": ">=9.2.2"
  "@octokit/request-error": ">=5.1.1"
  picomatch: ">=4.0.4"
  path-to-regexp: ">=8.4.0"
  brace-expansion: ">=5.0.5"
  yaml: ">=2.8.3"
  vite: ">=7.3.2"
  lodash-es: ">=4.18.0"

# SECURITY: supply-chain hardening (npm-security-best-practices)
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - "@educlopez/*"
blockExoticSubdeps: true
